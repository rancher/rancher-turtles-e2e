# get this file after provisioning a cluster with CAPZ RKE2 clusterclass
# currently it is a copy of CAPZ AKS cluster.yaml
{{- $cluster_name := printf "%s-%s" .Values.clustername_prefix (randAlphaNum 4) | lower -}}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedCluster
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: {{ $cluster_name }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedControlPlane
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: {{ $cluster_name }}
spec:
  identityRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureClusterIdentity
    name: cluster-identity
  location: "{{ .Values.cluster.location }}"
  resourceGroupName: {{ $cluster_name }}
  nodeResourceGroupName: {{ $cluster_name }}-nodes
  sshPublicKey: null
  subscriptionID: "{{ .Values.azure.subscriptionID }}"
  version: "{{ .Values.cluster.kubernetesVersion }}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedMachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: {{ $cluster_name }}-pool0
spec:
  mode: System
  name: pool0
  sku: Standard_D2s_v3
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedMachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: {{ $cluster_name }}-pool1
spec:
  mode: User
  name: pool1
  sku: Standard_D2s_v3
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: {{ $cluster_name }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 192.168.0.0/16
  controlPlaneRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureManagedControlPlane
    name: {{ $cluster_name }}
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureManagedCluster
    name: {{ $cluster_name }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: {{ $cluster_name }}-pool0
spec:
  clusterName: {{ $cluster_name }}
  replicas: {{ .Values.cluster.systempoolCount | int }}
  template:
    metadata: {}
    spec:
      bootstrap:
        dataSecretName: ""
      clusterName: {{ $cluster_name }}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AzureManagedMachinePool
        name: {{ $cluster_name }}-pool0
      version: "{{ .Values.cluster.kubernetesVersion }}"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: {{ $cluster_name }}-pool1
spec:
  clusterName: {{ $cluster_name }}
  replicas: {{ .Values.cluster.userpoolCount | int }}
  template:
    metadata: {}
    spec:
      bootstrap:
        dataSecretName: ""
      clusterName: {{ $cluster_name }}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AzureManagedMachinePool
        name: {{ $cluster_name }}-pool1
      version: "{{ .Values.cluster.kubernetesVersion }}"
----------------------------------------------------------------------

apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: RKE2ConfigTemplate
metadata:
  name: {{ $cluster_name }}-md-0
spec:
  template:
    spec:
      agentConfig:
        airGapped: true
        kubelet:
          extraArgs:
          - --cloud-provider=external
      preRKE2Commands:
      - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: RKE2ControlPlaneTemplate
metadata:
  name: {{ $cluster_name }}-control-plane
spec:
  template:
    spec:
      rolloutStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxSurge: 1
      agentConfig: {}
      serverConfig:
        cni: none
        cloudProviderName: external
        disableComponents:
          kubernetesComponents:
          - cloudController
        kubeAPIServer:
          extraArgs:
          - --anonymous-auth=true
      files:
        - owner: root:root
          path: /etc/kubernetes/azure.json
          permissions: "0644"