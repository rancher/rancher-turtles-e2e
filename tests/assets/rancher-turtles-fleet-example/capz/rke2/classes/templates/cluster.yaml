# get this file after provisioning a cluster with CAPZ RKE2 clusterclass
# currently it is a copy of CAPZ AKS cluster.yaml
{{- $cluster_name := printf "%s-%s" .Values.clustername_prefix (randAlphaNum 4) | lower -}}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
    cloud-provider: azure
    cni: calico
  name:{{ $cluster_name }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 192.168.0.0/16
  topology:
    class: azure-rke2-class
    controlPlane:
      replicas: 3
    variables:
    - name: subscriptionID
      value: "{{ .Values.azure.subscriptionID }}"
    - name: location
      value: "{{ .Values.azure.location }}"
    - name: resourceGroup
      value: {{ $cluster_name }}
    - name: azureClusterIdentityName
      value: cluster-identity
    version: v1.31.1+rke2r1   # determine if this needs to be changed
    workers:
      machineDeployments:
      - class: rke2-default-worker
        name: md-0
        replicas: 3