{{ $randomString := randAlphaNum 5 | lower}}
{{ $randomStringWithSuffix := printf "cluster-%s" $randomString }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureClusterIdentity
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    clusterctl.cluster.x-k8s.io/move-hierarchy: "true"
  name: cluster-identity
  namespace: default
spec:
  allowedNamespaces: {}
  clientID: "{{ .Values.azure.clientID }}"
  clientSecret:
    name: cluster-identity-secret
    namespace: default
  tenantID: "{{ .Values.azure.tenantID }}"
  type: ServicePrincipal
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedCluster
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: "{{ $randomStringWithSuffix }}"
  namespace: default
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedControlPlane
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: "{{ $randomStringWithSuffix }}"
  namespace: default
spec:
  identityRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureClusterIdentity
    name: cluster-identity
  location: "{{ .Values.cluster.location }}"
  resourceGroupName: "{{ $randomStringWithSuffix }}"
  nodeResourceGroupName: "{{ $randomStringWithSuffix }}-nodes"
  sshPublicKey: null
  subscriptionID: "{{ .Values.azure.subscriptionID }}"
  version: "{{ .Values.cluster.kubernetesVersion }}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedMachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: "{{ $randomStringWithSuffix }}-pool0"
  namespace: default
spec:
  mode: System
  name: pool0
  sku: Standard_D2s_v3
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureManagedMachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: "{{ $randomStringWithSuffix }}-pool1"
  namespace: default
spec:
  mode: User
  name: pool1
  sku: Standard_D2s_v3
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: "{{ $randomStringWithSuffix }}"
  namespace: default
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 192.168.0.0/16
  controlPlaneRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureManagedControlPlane
    name: "{{ $randomStringWithSuffix }}"
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureManagedCluster
    name: "{{ $randomStringWithSuffix }}"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: "{{ $randomStringWithSuffix }}-pool0"
  namespace: default
spec:
  clusterName: "{{ $randomStringWithSuffix }}"
  replicas: {{ .Values.cluster.systempoolCount | int }}
  template:
    metadata: {}
    spec:
      bootstrap:
        dataSecretName: ""
      clusterName: "{{ $randomStringWithSuffix }}"
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AzureManagedMachinePool
        name: "{{ $randomStringWithSuffix }}-pool0"
      version: "{{ .Values.cluster.kubernetesVersion }}"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachinePool
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  name: "{{ $randomStringWithSuffix }}-pool1"
  namespace: default
spec:
  clusterName: "{{ $randomStringWithSuffix }}"
  replicas: {{ .Values.cluster.userpoolCount | int }}
  template:
    metadata: {}
    spec:
      bootstrap:
        dataSecretName: ""
      clusterName: "{{ $randomStringWithSuffix }}"
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AzureManagedMachinePool
        name: "{{ $randomStringWithSuffix }}-pool1"
      version: "{{ .Values.cluster.kubernetesVersion }}"
