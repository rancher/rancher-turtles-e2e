namespace: default

helm:
  chart: ./capd-rke2-clusters
  values:
    clustername_prefix: turtles-qa-capd-rke2

diff:
  comparePatches:
  - apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerCluster
    name: turtles-qa-capd-rke2-*
    namespace: default
    operations:
    - {"op":"remove", "path":"/spec/loadBalancer"}
  - apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerMachineTemplate
    name: turtles-qa-capd-rke2-*-control-plane
    namespace: default
    operations:
    - {"op":"remove", "path":"/spec/template/spec/bootstrapTimeout"}
  - apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerMachineTemplate
    name: turtles-qa-capd-rke2-*-md-0
    namespace: default
    operations:
    - {"op":"remove", "path":"/spec/template/spec/bootstrapTimeout"}
