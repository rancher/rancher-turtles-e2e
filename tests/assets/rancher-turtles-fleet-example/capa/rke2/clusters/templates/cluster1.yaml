apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  labels:
    cloud-provider: aws
    csi: aws-ebs-csi-driver
  name: turtles-qa-aws-rke2-cp
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 192.168.0.0/16
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: RKE2ControlPlane
    name: turtles-qa-aws-rke2-cp-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
    kind: AWSCluster
    name: turtles-qa-aws-rke2-cp
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSCluster
metadata:
  name: turtles-qa-aws-rke2-cp
spec:
  bastion:
    enabled: true
  controlPlaneLoadBalancer:
    additionalListeners:
    - port: 9345
      protocol: TCP
    - port: 2379
      protocol: TCP
    ingressRules:
    - description: RKE2 Control Plane
      fromPort: 9345
      natGatewaysIPsSource: true
      protocol: tcp
      toPort: 9345
    - cidrBlocks:
      - 0.0.0.0/0
      description: Kubernetes API
      fromPort: 6443
      protocol: tcp
      toPort: 6443
    - description: Etcd
      fromPort: 2379
      natGatewaysIPsSource: true
      protocol: tcp
      toPort: 2379
    - description: Etcd peer
      fromPort: 2380
      natGatewaysIPsSource: true
      protocol: tcp
      toPort: 2380
    loadBalancerType: nlb
  network:
    additionalControlPlaneIngressRules:
    - description: RKE2 Control Plane additional group
      fromPort: 9345
      protocol: tcp
      sourceSecurityGroupRoles:
      - node
      - controlplane
      - apiserver-lb
      - lb
      toPort: 9345
    - description: Etcd
      fromPort: 2379
      natGatewaysIPsSource: true
      protocol: tcp
      toPort: 2379
    - description: Etcd peer
      fromPort: 2380
      natGatewaysIPsSource: true
      protocol: tcp
      toPort: 2380
    - description: Calico Typha
      fromPort: 5473
      protocol: tcp
      sourceSecurityGroupRoles:
      - node
      - controlplane
      - apiserver-lb
      - lb
      toPort: 5473
    - description: Calico Typha health check
      fromPort: 9098
      protocol: tcp
      sourceSecurityGroupRoles:
      - node
      - controlplane
      - apiserver-lb
      - lb
      toPort: 9098
    - description: Calico health check
      fromPort: 9099
      protocol: tcp
      sourceSecurityGroupRoles:
      - node
      - controlplane
      - apiserver-lb
      - lb
      toPort: 9099
    vpc:
      availabilityZoneUsageLimit: 1
  region: ap-south-2
  sshKeyName: turtles-qa-rke2
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: RKE2ControlPlane
metadata:
  name: turtles-qa-aws-rke2-cp-control-plane
spec:
  agentConfig:
    kubelet:
      extraArgs:
      - --cloud-provider=external
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSMachineTemplate
      name: turtles-qa-aws-rke2-cp-control-plane
    nodeDrainTimeout: 2m
  preRKE2Commands:
  - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
  replicas: 1
  rolloutStrategy:
    rollingUpdate:
      maxSurge: 1
    type: RollingUpdate
  serverConfig:
    cloudProviderName: external
    cni: calico
    etcd:
      backupConfig:
        retention: "10"
        scheduleCron: '*/15 * * * *'
  version: v1.31.7+rke2r1
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: turtles-qa-aws-rke2-cp-control-plane
spec:
  template:
    spec:
      ami:
        id: ami-063222db4f3a22666
      iamInstanceProfile: control-plane.cluster-api-provider-aws.sigs.k8s.io
      instanceType: t3.xlarge
      rootVolume:
        size: 50
      sshKeyName: turtles-qa-rke2
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: turtles-qa-aws-rke2-cp-md-0
  annotations:
    "helm.sh/resource-policy": keep
spec:
  clusterName: turtles-qa-aws-rke2-cp
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: turtles-qa-aws-rke2-cp
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: turtles-qa-aws-rke2-cp
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: RKE2ConfigTemplate
          name: turtles-qa-aws-rke2-cp-md-0
      clusterName: turtles-qa-aws-rke2-cp
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: turtles-qa-aws-rke2-cp-md-0
      version: v1.31.7+rke2r1
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: turtles-qa-aws-rke2-cp-md-0
spec:
  template:
    spec:
      ami:
        id: ami-063222db4f3a22666
      iamInstanceProfile: nodes.cluster-api-provider-aws.sigs.k8s.io
      instanceType: t3.xlarge
      rootVolume:
        size: 50
      sshKeyName: turtles-qa-rke2
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: RKE2ConfigTemplate
metadata:
  name: turtles-qa-aws-rke2-cp-md-0
spec:
  template:
    spec:
      agentConfig:
        kubelet:
          extraArgs:
          - --cloud-provider=external
      preRKE2Commands:
      - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
